<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+JP|Inter:400,700">
    <title>Premium Redesign</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F3EA;
            color: #3F3F3F;
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, h4 {
            color: #D47080;
        }
        .bilingual-container {
            display: flex;
            flex-wrap: wrap;
        }
        .bilingual-row {
            flex-direction: column;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
        }
        .hero {
            background-color: rgba(255, 255, 255, 0.3);
            padding: 50px;
            text-align: center;
            border-radius: 15px;
        }
        .story, .feature {
            margin: 20px;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .feature-card:hover {
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            .bilingual-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="hero glass-container">
        <h1>Main Headline</h1>
        <h2>Subheadline</h2>
    </div>

    <div class="story glass-container">
        <h3>Story Title</h3>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Quisque vehicula.</p>
    </div>

    <div class="features bilingual-container">
        <div class="feature glass-container feature-card">
            <h4>Feature 1</h4>
            <p>Description of Feature 1.</p>
        </div>
        <div class="feature glass-container feature-card">
            <h4>Feature 2</h4>
            <p>Description of Feature 2.</p>
        </div>
    </div>
</body>
</html>
