<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>まもぺっと | Mamopetto</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Jost',sans-serif;
  background:#F9F3EA;
  color:#F6999C;
}

/* HERO */
.hero {
  padding:120px 20px;
  text-align:center;
  background:#F6E6A7;
}

/* SPLIT */
.split {
  display:grid;
  grid-template-columns:1fr 1fr;
}
.split .text { padding:60px; }
.split .image {
  background:url('https://drive.google.com/uc?export=view&id=1AOnEfq9nJ3Xi3VD9eYSfjBmS8QEUYQEN') center/cover;
  min-height:420px;
}

/* IMAGE STRIPS */
.image-strip img,
.image-strip-2 img {
  width:100%;
  height:420px;
  object-fit:cover;
}

/* PRODUCTS */
.products { padding:80px 20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  max-width:1000px;
  margin:0 auto;
}

.card {
  border-radius:16px;
  overflow:hidden;
  background:#fff;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card p {
  padding:12px;
}

/* EMAIL */
.email {
  padding:80px 20px;
  text-align:center;
}

.illus-box img {
  width:100%;
  max-width:320px;
  border-radius:20px;
  margin-top:20px;
}

/* IG + LINE CENTER FIX */
.ig, .line {
  padding:80px 20px;
  text-align:center;
}

.ig-wrap,
.line-wrap {
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:20px;
}

.line-wrap {
  flex-direction:column;
  gap:20px;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 28px;
  background:#F6999C;
  color:#fff;
  border-radius:999px;
  text-decoration:none;
  font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .split{grid-template-columns:1fr;}
  .grid{grid-template-columns:1fr 1fr;}
}
</style>

<script src="https://elfsightcdn.com/platform.js" async></script>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Prepared, for the ones who depend on you.</h1>
  <p>Emergency kit for pet families in Tokyo.</p>
</section>

<!-- SPLIT -->
<section class="split">
  <div class="text">
    <h2>あの時の不安から、つくりました。</h2>
    <p>Built from a real moment of uncertainty.</p>
  </div>
  <div class="image"></div>
</section>

<!-- IMAGE STRIP -->
<section class="image-strip">
  <img src="https://drive.google.com/uc?export=view&id=1tSfdANzH_aWa1kIs49cHfwm7_nWeACqB">
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>Kit Highlights</h2>

  <div class="grid">
    <div class="card">
      <img src="https://drive.google.com/uc?export=view&id=1_vZz1RUzGfZnZSKts1-dZA_U8nBBPoMr">
      <p>Water</p>
    </div>

    <div class="card">
      <img src="https://drive.google.com/uc?export=view&id=1jmSmEj8YaBvMwkuTWXY34TJvH5JhP_E_">
      <p>First Aid</p>
    </div>

    <div class="card">
      <img src="https://drive.google.com/uc?export=view&id=1alSA1mFtdZZn4fKxkDRkOI9BP2rDHh63">
      <p>Food</p>
    </div>

    <div class="card">
      <img src="https://drive.google.com/uc?export=view&id=1NBji3u_ORc4WaGrz8POnQ5OxoQ4qJRb5">
      <p>Comfort</p>
    </div>
  </div>
</section>

<!-- SECOND IMAGE STRIP -->
<section class="image-strip-2">
  <img src="https://drive.google.com/uc?export=view&id=1tSfdANzH_aWa1kIs49cHfwm7_nWeACqB">
</section>

<!-- EMAIL -->
<section class="email">
  <h2>Get early access</h2>

  <div class="illus-box">
    <img src="https://drive.google.com/uc?export=view&id=179cxiLjJL1GMHo_9QSP1H57LPneycLGk">
  </div>

  <form>
    <input type="email" placeholder="your@email.com" style="padding:12px; margin-top:20px;">
    <br><br>
    <button class="btn">Join</button>
  </form>
</section>

<!-- INSTAGRAM -->
<section class="ig">
  <h3>Instagram</h3>

  <div class="ig-wrap">
    <div class="elfsight-app-4b419cbe-b0ba-4eb8-9de7-24d004fc807f"></div>
  </div>
</section>

<!-- LINE -->
<section class="line">
  <h3>LINE</h3>

  <div class="line-wrap">
    <img src="https://qr-official.line.me/gs/M_547cqlbl_GW.png" width="140">

    <a href="https://lin.ee/547cqlbl" class="btn">
      Connect on LINE
    </a>
  </div>
</section>

</body>
</html>
