<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>まもぺっと | Mamopetto</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ========= ROOT ========= */
:root {
  --pink: #F6999C;
  --mint: #A8E0D0;
  --butter: #F6E6A7;
  --cream: #F9F3EA;
  --pink-deep: #D47080;
  --text-dark: #3F3F3F;
  --text-muted: #6B7280;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
}

/* ========= HERO ========= */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 20px;

  background: linear-gradient(
    120deg,
    #F9F3EA,
    #F6E6A7,
    #A8E0D0,
    #F6999C
  );
  background-size: 300% 300%;
  animation: gradientFlow 14s ease infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.hero h1 {
  font-family: 'Noto Sans JP';
  font-weight: 700;
  color: var(--pink-deep);
}

.hero p {
  color: var(--text-muted);
}

/* FLOAT IMAGE */
.hero img {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  margin: 20px 0;
  object-fit: cover;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
  100% { transform: translateY(0); }
}

/* ========= FEATURES ========= */
.features {
  padding: 60px 20px;
  text-align: center;
}

.feature-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.feature {
  padding: 20px;
  border-radius: 12px;
  background: white;
}

/* ========= EMAIL ========= */
.email-signup {
  padding: 60px 20px;
  background: linear-gradient(180deg, #F9F3EA, #F6E6A7);
}

.email-box {
  max-width: 800px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 20px;
  align-items: center;
}

.email-box img {
  width: 120px;
  border-radius: 50%;
}

.email-text {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.inline {
  display: flex;
  gap: 6px;
  white-space: nowrap;
}

.jp {
  font-family: 'Noto Sans JP';
  font-weight: 700;
  color: var(--pink-deep);
}

.en {
  font-family: 'Playfair Display';
  color: var(--text-muted);
}

/* FORM */
form {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  background: var(--pink);
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
}

@media(max-width:700px){
  .email-box {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .inline {
    justify-content: center;
  }

  form {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>大切な家族のための、準備。</h1>
  <p>Prepared for the ones who depend on you</p>

  <img src="images/circle.jpg" alt="kit">

  <p>東京で暮らすすべてのペットのために / For pet families in Tokyo</p>
</section>

<!-- FEATURES -->
<section class="features">
  <h2>キット内容 / Kit Highlights</h2>

  <div class="feature-grid">
    <div class="feature">💧 水 / Water</div>
    <div class="feature">🩹 応急手当 / First Aid</div>
    <div class="feature">🍱 食料 / Food</div>
    <div class="feature">🤍 安心 / Comfort</div>
  </div>
</section>

<!-- EMAIL -->
<section class="email-signup" id="waitlist">
  <div class="email-box">

    <img src="images/email.jpg" alt="email">

    <div class="email-text">

      <div class="inline">
        <span class="jp">最新情報を受け取る</span>
        <span>/</span>
        <span class="en">Get early access</span>
      </div>

      <div class="inline">
        <span>新しいリリースをお届け</span>
        <span>/</span>
        <span>Be first to know</span>
      </div>

      <!-- NETLIFY FORM -->
      <form name="waitlist" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="waitlist">
        <input type="email" name="email" placeholder="your@email.com" required>
        <button type="submit">Join</button>
      </form>

      <div class="inline">
        <span>迷惑メールなし</span>
        <span>/</span>
        <span>No spam</span>
      </div>

    </div>
  </div>
</section>

</body>
</html>
