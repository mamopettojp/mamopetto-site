<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>まもぺっと | Mamopetto</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Zen Maru Gothic', sans-serif;
  background:#F6F1E8;
  color:#2A2020;
}

/* HERO */
.hero{
  padding:120px 20px;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  color:#2E4A78;
  line-height:1.4;
}

.jp{
  color:#F6999C;
  font-size:1.2rem;
  display:block;
  margin-bottom:20px;
}

/* SPLIT SECTION */
.split{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.split .text{
  padding:80px;
  background:#4A6FA5;
  color:white;
}

.split .image{
  background:url('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e') center/cover;
}

/* IMAGE STRIP */
.image-strip img{
  width:100%;
  display:block;
}

/* PRODUCT GRID */
.products{
  padding:80px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

/* EMAIL */
.email{
  background:#FFF9CB;
  padding:80px 20px;
  text-align:center;
}

input{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:2px solid #2A2020;
}

.btn{
  background:#F6999C;
  color:white;
  padding:14px 24px;
  border-radius:999px;
  border:none;
  margin-top:10px;
}

.success{
  display:none;
  margin-top:20px;
  font-weight:bold;
}

/* IG */
.ig{
  padding:80px 20px;
  text-align:center;
}

.ig-wrap{
  display:flex;
  justify-content:center;
}

.ig-wrap > div{
  max-width:400px;
  width:100%;
}

/* LINE */
.line{
  padding:80px 20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <span class="jp">大切な家族のための、準備。</span>
  <h1>Prepared, for the ones who depend on you.</h1>
  <p>東京で暮らすペットのための緊急キット。</p>
</section>

<!-- SPLIT (THIS is the big visual change) -->
<section class="split">
  <div class="text">
    <h2>備えがあると、安心できる。</h2>
    <p>
      災害時、ペットのための準備は後回しになりがちです。<br><br>
      Mamopettoは、日常の中に自然に備えを取り入れます。
    </p>
  </div>

  <div class="image"></div>
</section>

<!-- IMAGE STRIP -->
<section class="image-strip">
  <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2 style="text-align:center;">Kit Highlights</h2>

  <div class="grid">
    <div class="card">Water</div>
    <div class="card">First Aid</div>
    <div class="card">Food</div>
    <div class="card">Comfort</div>
  </div>
</section>

<!-- EMAIL -->
<section class="email">
  <h2>Get early access</h2>

  <form name="waitlist" method="POST" data-netlify="true" onsubmit="handleSubmit(event)">
    <input type="hidden" name="form-name" value="waitlist">
    <input type="email" name="email" placeholder="email" required><br>
    <button class="btn">Join</button>
  </form>

  <div id="success" class="success">You’re in ✨</div>
</section>

<!-- IG -->
<section class="ig">
  <h3>Instagram</h3>

  <div class="ig-wrap">
    <div>
      <script src="https://elfsightcdn.com/platform.js" async></script>
      <div class="elfsight-app-4b419cbe-b0ba-4eb8-9de7-24d004fc807f"></div>
    </div>
  </div>
</section>

<!-- LINE -->
<section class="line">
  <h3>LINE</h3>

  <img src="https://qr-official.line.me/gs/M_547cqlbl_GW.png" width="120"><br>

  <a href="https://lin.ee/547cqlbl" class="btn">追加する</a>
</section>

<script>
function handleSubmit(e){
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);

  fetch("/", { method: "POST", body: data })
    .then(() => {
      form.style.display = "none";
      document.getElementById("success").style.display = "block";
    });
}
</script>

</body>
</html>
